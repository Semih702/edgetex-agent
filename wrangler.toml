name = "edgetex-agent"
main = "worker/index.ts"
compatibility_date = "2026-04-26"
workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "edgetex-db"
database_id = "00000000-0000-0000-0000-000000000000" # Replace with the ID returned by `wrangler d1 create edgetex-db`.

